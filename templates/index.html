<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include '_navbar.html' %}
    <div class="container">
        
        
        <style>
            .cart-img{
                position: relative;
                width: 100px;
            }
            .cart-img::after{
                content: "{{ cart_count}}";
                position: absolute;
                right: 0;
                bottom: 0;
                width: 30px;
                height: 30px;
                border-radius: 50%;

                background-color: black;
                color: rgb(255, 255, 255);
                text-align: center;
                font-size: 20px;
            }

        </style>

        <h2>Каталог товаров</h2>

        {% if type_user == 2 or type_user == 3 %}
            <div>
                <a href="{{ url_for('add_product') }}"><button class="btn">Добавить товар</button></a>
            </div>
        {% endif %}

        <!-- <div>
            <a href="{{ url_for('regster_page') }}"><button>Регистрация</button></a>
        </div>
        <div>
            <a href="{{ url_for('login_page') }}"><button>Войти</button></a>
        </div> -->

        <!-- {% if "user_id" in session %}
            <div class="profile-img">
                <a href="{{ url_for('profile', user_id=session['user_id']) }}">
                <img src="{{ url_for('static', filename='img/profile_img.png') }}" alt="" width="120">
                </a>
            </div>
        {% else %}
            <div class="profile-img">
                <a href="{{ url_for('register_or_login') }}">
                <img src="{{ url_for('static', filename='img/profile_img.png') }}" alt="" width="120"> 
                </a>
            </div>
        {% endif %} -->

        

        <!-- <div class="cart-img">
            <a href="{{ url_for('cart') }}">
            <img src="{{ url_for('static', filename='img/basket.png') }}" alt="" width="100">
            </a>
        </div> -->

        <form method="GET">
            <select name="type_products" id="">
                <option value="all" {% if cur_type == "all" %}selected{% endif %}>все</option>
                <option value="1" {% if cur_type == "1" %}selected{% endif %}>электроника</option>
                <option value="2" {% if cur_type == "2" %}selected{% endif %}>продовольственные товары</option>
                <option value="3" {% if cur_type == "3" %}selected{% endif %}>одежда</option>
                <option value="4" {% if cur_type == "4" %}selected{% endif %}>обувь</option>
                <option value="5" {% if cur_type == "5" %}selected{% endif %}>детские товары</option>
                <option value="6" {% if cur_type == "6" %}selected{% endif %}>уходовая косметика</option>
                <option value="7" {% if cur_type == "7" %}selected{% endif %}>зоотовары</option>
                <option value="8" {% if cur_type == "8" %}selected{% endif %}>строительство и ремонт</option>
                <option value="9" {% if cur_type == "9" %}selected{% endif %}>аптека</option>
                <option value="10" {% if cur_type == "10" %}selected{% endif %}>аксессуары</option>
                <option value="11" {% if cur_type == "11" %}selected{% endif %}>хобби</option>
            </select>
            <button>Применить</button>
        </form>
        
        
        <div class="products">
            {% for product in products %}
                <div class="product">
                    <h3>{{ product[1] }}</h3>
                    <p>{{ product[3] }}</p>
                    <p>Цена: {{ product[2] }} руб.</p>
                    {% if product[5] %}
                        <img src="{{ product[5] }}" width="200">
                    {% endif %}
                    <a href="{{ url_for('product', product_id=product[0]) }}"><button class="btn">Подробнее</button></a>
                    <a href="{{ url_for('add_to_cart', product_id=product[0]) }}"><button class="btn">Добавить в корзину</button></a>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>

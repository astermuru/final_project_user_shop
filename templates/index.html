<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Онлайн магазин</h1>
    
    <style>
        .cart-img{
            position: relative;
            width: 100px;
        }
        .cart-img::after{
            content: "{{ cart_count}}";
            position: absolute;
            right: 0;
            bottom: 0;
            width: 35px;
            height: 35px;
            border-radius: 50%;

            background-color: black;
            color: rgb(255, 255, 255);
            text-align: center;
            font-size: 30px;
        }

    </style>

     {% if type_user == 2 or type_user == 3 %}
        <div>
            <a href="{{ url_for('add_product') }}"><button>Добавить товар</button></a>
        </div>
    {% endif %}

    <!-- <div>
        <a href="{{ url_for('regster_page') }}"><button>Регистрация</button></a>
    </div>
    <div>
        <a href="{{ url_for('login_page') }}"><button>Войти</button></a>
    </div> -->

    {% if user_id in session %}
        <div class="profile-img">
            <a href="{{ url_for('profile', user_id=session['user_id']) }}">
            <img src="{{ url_for('static', filename='img/profile_img.png') }}" alt="" width="120">
            </a>
        </div>
    {% else %}
        <a href="{{ url_for('register_or_login') }}">
         <img src="{{ url_for('static', filename='img/profile_img.png') }}" alt="" width="120">
        </a>
    {% endif %}

    <h2>Каталог товаров</h2>

    <div class="cart-img">
        <a href="{{ url_for('cart') }}">
        <img src="{{ url_for('static', filename='img/basket.png') }}" alt="" width="100">
        </a>
    </div>
    
    
    <div class="products">
        {% for product in products %}
            <div class="product">
                <h3>{{ product[1] }}</h3>
                <p>{{ product[3] }}</p>
                <p>Цена: {{ product[2] }} руб.</p>
                {% if product[5] %}
                    <img src="{{ product[5] }}" width="200">
                {% endif %}
                <a href="{{ url_for('product', product_id=product[0]) }}"><button>Подробнее</button></a>
                <a href="{{ url_for('add_to_cart', product_id=product[0]) }}"><button>Добавить в корзину</button></a>
            </div>
        {% endfor %}
    </div>
</body>
</html>

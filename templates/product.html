<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include '_navbar.html' %}
    <div class="product-detail">
        <img src="../{{ product.image }}" width="200" class="product-detail-image">
        <div class="product-detail-content">
            <h1  class="product-detail-title">Название: {{product.name}}</h1>
            <div class="product-detail-category">Тип: {{ product.type_products }}</div>
            <div class="product-detail-price">Цена: {{product.price}} руб.</div>
            <div class="product-detail-description">Описание: {{product.description}}</div>
            
            <br><br>
            <!-- <p>{{ type_user }}</p> -->
            {% if type_user == 2 or type_user == 3 %}
                <form action="{{ url_for('delete_product', product_id=product.id)}}" method="POST">
                    <button type="submit" class="btn btn-danger">Удалить товар</button>
                </form>
            {% endif %}
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>добавление товара</h1>
    <form action="/add_product" method="POST" enctype="multipart/form-data">
        <label for="name">Название:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="price">Цена:</label><br>
        <input type="number" id="price" name="price" required><br><br>

        <div>
        <!--выпадающее меню-->
        <select name="type_products" id="">
            <option value="1">электроника</option>
            <option value="2">продовольственные товары</option>
            <option value="3">одежда</option>
            <option value="4">обувь</option>
            <option value="5">детские товары</option>
            <option value="6">уходовая косметика</option>
            <option value="7">зоотовары</option>
            <option value="8">строительство и ремонт</option>
            <option value="9">аптека</option>
            <option value="10">аксессуары</option>
            <option value="11">хобби</option>


        </select>
    </div>

        <label for="description">Описание:</label><br>
        <textarea id="description" name="description" required></textarea><br><br>

        <label for="image">Изображение:</label><br>
        <input type="file" id="image" name="image" required>
        
        <br><br>
        

        <input type="submit" value="Добавить товар">
    </form>
</body>
</html>
